version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rematepos-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=es_ES.UTF-8"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - rematepos-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:4.23
    container_name: rematepos-liquibase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LIQUIBASE_COMMAND_DB_URL: ${LIQUIBASE_DB_URL}
      LIQUIBASE_COMMAND_DB_USERNAME: ${LIQUIBASE_DB_USERNAME}
      LIQUIBASE_COMMAND_DB_PASSWORD: ${LIQUIBASE_DB_PASSWORD}
      LIQUIBASE_COMMAND_CHANGELOG_FILE: ${LIQUIBASE_CHANGELOG_FILE}
    volumes:
      - ./src/main/resources:/liquibase/changelog
    networks:
      - rematepos-network
    command: update
    restart: "no"

volumes:
  postgres_data:

networks:
  rematepos-network:
    driver: bridge

