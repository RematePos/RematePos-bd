databaseChangeLog:
  - changeSet:
      id: create-table-product-categories
      author: system
      changes:
        - createTable:
            tableName: product_categories
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: uuid_generate_v4()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: product_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_categories_product
                    references: products(id)
              - column:
                  name: category_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_categories_category
                    references: categories(id)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: product_categories
            columnNames: product_id, category_id
            constraintName: uk_product_category_unique
      rollback:
        - dropTable:
            tableName: product_categories

